<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Celestial">
    <link rel="manifest" href="manifest.json">
    <title>Celestial • Control Center</title>
    <!-- Keep in sync with the _CSP constant in core/api_server.py -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:8765 http://localhost:8765; manifest-src 'self'">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- non-blocking load: icon font isn't needed for first paint -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <style>
        body { font-family: system-ui, sans-serif; }
        .glass { background: rgba(18, 26, 46, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="bg-[#0a0f1e] text-[#e0e7ff] min-h-screen">
    <nav class="border-b border-white/10 bg-[#0a0f1e]/95 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-[#00d4ff] to-[#00ff9d] flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-[#0a0f1e]"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight">Celestial</span>
                <span class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-semibold">SECURE</span>
            </div>
            <button onclick="showSettings()" aria-label="Settings" class="p-3.5 rounded-xl hover:bg-white/10"><i class="fa-solid fa-cog"></i></button>
        </div>
    </nav>

    <main class="max-w-screen-2xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold mb-2">Secure Tunnel</h1>
        <p class="text-slate-400 mb-8">All traffic obfuscated • Zero leaks • Kill-switch armed</p>

        <div id="main-metrics" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-3xl p-6">
                <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">TUNNEL STATUS</div>
                <div id="tunnel-status-text" class="text-3xl font-semibold text-emerald-400">ACTIVE</div>
            </div>
            <div class="glass rounded-3xl p-6">
                <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">PROTECTION SCORE</div>
                <div class="text-5xl font-semibold">98<span class="text-emerald-400 text-2xl">/100</span></div>
            </div>
            <div class="glass rounded-3xl p-6">
                <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">BLOCKED TODAY</div>
                <div id="blocked-count" class="text-5xl font-semibold">184</div>
            </div>
            <div class="glass rounded-3xl p-6">
                <div class="text-xs uppercase tracking-wider text-slate-400 mb-1">KILL SWITCH</div>
                <div class="text-xl font-semibold mt-1">Armed & Ready</div>
            </div>
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="launchSession()" class="bg-[#00d4ff] text-black px-8 py-3 rounded-2xl font-semibold hover:opacity-90 transition">
                Launch Secure Session →
            </button>
            <button onclick="window.location.reload()" class="border border-white/20 px-6 py-3 rounded-2xl hover:bg-white/5">
                Refresh
            </button>
        </div>

        <div class="glass rounded-3xl p-6">
            <div class="text-xs uppercase tracking-wider text-slate-400 mb-4">LIVE AUDIT LOG</div>
            <div id="audit-log" role="log" aria-live="polite" aria-label="Live audit log" class="space-y-2 text-sm font-mono max-h-64 overflow-auto"></div>
        </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0f1629] border-t border-white/10 z-50">
        <div class="flex justify-around py-2 text-xs">
            <button onclick="document.getElementById('main-metrics').scrollIntoView({behavior:'smooth'})" class="flex flex-col items-center p-2 text-[#00d4ff]">
                <i class="fa-solid fa-shield-halved text-lg"></i><span>Status</span>
            </button>
            <button onclick="document.getElementById('audit-log').scrollIntoView({behavior:'smooth'})" class="flex flex-col items-center p-2">
                <i class="fa-solid fa-list-check text-lg"></i><span>Audit</span>
            </button>
            <button onclick="showSettings()" class="flex flex-col items-center p-2">
                <i class="fa-solid fa-cog text-lg"></i><span>Settings</span>
            </button>
        </div>
    </div>

    <!-- Settings modal -->
    <div id="settings-overlay" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4" onclick="if (event.target === this) closeSettings()">
        <div class="glass rounded-3xl p-6 w-full max-w-md max-h-[85vh] overflow-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="closeSettings()" aria-label="Close" class="p-2 rounded-xl hover:bg-white/10"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="settings-body" class="text-sm text-slate-400">Loading…</div>
        </div>
    </div>

    <script>
        // Default matches CELESTIAL_API_HOST/CELESTIAL_API_PORT defaults in core/api_server.py.
        const API_BASE = 'http://127.0.0.1:8765';

        async function updateLiveStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                const el = document.getElementById('tunnel-status-text');
                if (el) {
                    el.textContent = data.tunnel_healthy ? 'ACTIVE' : 'COMPROMISED';
                    el.className = data.tunnel_healthy ? 'text-3xl font-semibold text-emerald-400' : 'text-3xl font-semibold text-red-400';
                }
                const blocked = document.getElementById('blocked-count');
                if (blocked) blocked.textContent = data.blocked_today || 184;
            } catch (e) {
                const el = document.getElementById('tunnel-status-text');
                if (el) {
                    el.textContent = 'OFFLINE';
                    el.className = 'text-3xl font-semibold text-amber-400';
                }
            }
        }

        function launchSession() {
            const url = prompt('Enter URL to open securely:', 'https://github.com');
            if (url) {
                window.open(url, '_blank');
                addAudit('allow', `Launched secure session → ${url}`);
            }
        }

        function addAudit(type, msg) {
            const log = document.getElementById('audit-log');
            const div = document.createElement('div');
            div.className = type === 'block' ? 'text-red-400' : 'text-emerald-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(div);
        }

        // Token lives at desktop/config/.api_token; dashboard is served from
        // desktop/ by the same static server, so this is a same-origin fetch.
        let _apiToken = null;
        async function getApiToken() {
            if (_apiToken) return _apiToken;
            const res = await fetch('./config/.api_token');
            if (!res.ok) throw new Error(`token unavailable (${res.status})`);
            _apiToken = (await res.text()).trim();
            return _apiToken;
        }

        let _currentConfig = null;

        function renderSettingsBody(html) {
            document.getElementById('settings-body').innerHTML = html;
        }

        function renderSettingsError(msg) {
            renderSettingsBody(`<p class="text-red-400 mb-4">${msg}</p><button onclick="showSettings()" class="border border-white/20 px-4 py-2 rounded-xl hover:bg-white/5">Retry</button>`);
        }

        function renderSettingsForm(config) {
            const whitelist = (config.whitelist || []).join('\n');
            const killSwitch = !!(config.network_obfuscation && config.network_obfuscation.kill_switch);
            renderSettingsBody(`
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2">Whitelist (one host per line)</label>
                <textarea id="settings-whitelist" rows="6" class="w-full bg-black/30 border border-white/10 rounded-xl p-3 mb-4 font-mono text-xs text-[#e0e7ff]">${whitelist}</textarea>
                <label class="flex items-center gap-3 mb-6 cursor-pointer">
                    <input id="settings-killswitch" type="checkbox" ${killSwitch ? 'checked' : ''} class="w-4 h-4">
                    <span>Kill-switch armed</span>
                </label>
                <div id="settings-status" class="text-xs text-red-400 mb-3"></div>
                <div class="flex gap-3">
                    <button onclick="saveSettings()" class="bg-[#00d4ff] text-black px-6 py-2.5 rounded-xl font-semibold hover:opacity-90 transition">Save</button>
                    <button onclick="closeSettings()" class="border border-white/20 px-6 py-2.5 rounded-xl hover:bg-white/5">Cancel</button>
                </div>
            `);
        }

        async function showSettings() {
            document.getElementById('settings-overlay').classList.remove('hidden');
            renderSettingsBody('Loading…');
            try {
                const token = await getApiToken();
                const res = await fetch(`${API_BASE}/config`, { headers: { 'X-Celestial-Token': token } });
                if (!res.ok) throw new Error(`config fetch failed (${res.status})`);
                const data = await res.json();
                _currentConfig = data.error ? {} : data;
                renderSettingsForm(_currentConfig);
            } catch (e) {
                renderSettingsError(e.message);
            }
        }

        function closeSettings() {
            document.getElementById('settings-overlay').classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSettings();
        });

        async function saveSettings() {
            const whitelist = document.getElementById('settings-whitelist').value
                .split('\n').map(s => s.trim()).filter(Boolean);
            const killSwitch = document.getElementById('settings-killswitch').checked;
            const updated = {
                ..._currentConfig,
                whitelist,
                network_obfuscation: { ...(_currentConfig.network_obfuscation || {}), enabled: killSwitch, kill_switch: killSwitch },
            };
            const statusEl = document.getElementById('settings-status');
            try {
                const token = await getApiToken();
                const res = await fetch(`${API_BASE}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Celestial-Token': token },
                    body: JSON.stringify(updated),
                });
                if (!res.ok) throw new Error(`save failed (${res.status})`);
                _currentConfig = updated;
                addAudit('allow', 'Settings updated');
                closeSettings();
            } catch (e) {
                statusEl.textContent = e.message;
            }
        }

        // Init — pause polling while tab is hidden to cut network/battery cost
        let pollTimer = null;
        function startPolling() {
            if (pollTimer) return;
            updateLiveStatus();
            pollTimer = setInterval(updateLiveStatus, 5000);
        }
        function stopPolling() {
            clearInterval(pollTimer);
            pollTimer = null;
        }
        document.addEventListener('visibilitychange', () => {
            document.hidden ? stopPolling() : startPolling();
        });
        startPolling();
        addAudit('allow', 'Celestial Control Center initialized');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
