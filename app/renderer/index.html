<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Celestial</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chrome">
    <div id="topbar">
      <div id="brand" title="Celestial">
        <svg class="brand-mark" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <circle cx="3" cy="12.5" r="1.1"></circle>
          <circle cx="8.2" cy="3.6" r="1.1"></circle>
          <circle cx="13" cy="9.8" r="1.1"></circle>
          <path d="M3 12.5L8.2 3.6L13 9.8" stroke="currentColor" stroke-width="0.75" fill="none"></path>
        </svg>
        <span>Celestial</span>
      </div>
      <div id="tabstrip">
        <button id="new-tab-btn" title="New tab" aria-label="New tab">+</button>
      </div>
      <div id="topbar-right">
        <button id="bookmark-btn" title="Bookmarks" aria-label="Bookmarks">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M6 3h12v18l-6-4-6 4V3z"></path></svg>
        </button>
        <button id="history-btn" title="History" aria-label="History">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.6"></circle><path d="M12 7.5v5l3.5 2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg>
        </button>
        <button id="downloads-btn" title="Downloads" aria-label="Downloads">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M12 3v11.5M8 11l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path><path d="M5 17.5v2a1.5 1.5 0 001.5 1.5h11a1.5 1.5 0 001.5-1.5v-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg>
        </button>
        <button id="menu-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><circle cx="5" cy="12" r="1.7"></circle><circle cx="12" cy="12" r="1.7"></circle><circle cx="19" cy="12" r="1.7"></circle></svg>
        </button>
      </div>
    </div>
    <div id="navbar">
      <button id="back-btn" title="Back" aria-label="Back">&larr;</button>
      <button id="fwd-btn" title="Forward" aria-label="Forward">&rarr;</button>
      <button id="reload-btn" title="Reload" aria-label="Reload">&#8635;</button>
      <div id="address-wrap">
        <div id="status-pill" class="status-pill" role="status" aria-live="polite" title="Connection status">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <path class="shield-outline" d="M12 2.5l7.5 3.2v5.7c0 5.3-3.3 9-7.5 10.6-4.2-1.6-7.5-5.3-7.5-10.6V5.7L12 2.5z"></path>
            <circle class="shield-core" cx="12" cy="11.4" r="2.5"></circle>
            <circle class="shield-eclipse" cx="14.3" cy="9.9" r="2.5"></circle>
          </svg>
        </div>
        <input id="address-bar" type="text" placeholder="Search or enter address" autocomplete="off" aria-label="Address bar">
      </div>
    </div>
  </div>
  <div id="bookmarks-panel" class="panel hidden">
    <div id="bookmarks-add-row">+ Add current page</div>
    <div id="bookmarks-io-row">
      <button id="bookmarks-export-btn">Export</button>
      <button id="bookmarks-import-btn">Import</button>
    </div>
    <div id="bookmarks-list"></div>
  </div>
  <div id="settings-panel" class="panel panel-wide hidden">
    <div class="panel-section-title">Connection</div>
    <div id="settings-status" class="settings-status">Checking...</div>

    <div class="panel-section-title">Kill-switch</div>
    <label class="settings-toggle"><input type="checkbox" id="killswitch-toggle"> Enabled</label>
    <label class="settings-toggle"><input type="checkbox" id="strict-killswitch-toggle"> Strict (fail closed always)</label>

    <div class="panel-section-title">Tracker whitelist</div>
    <div id="whitelist-list"></div>
    <div class="settings-add-row">
      <input id="whitelist-input" type="text" placeholder="example.com" class="settings-input mono">
      <button id="whitelist-add-btn">Add</button>
    </div>

    <div class="panel-section-title">Upstream tunnel</div>
    <label class="settings-toggle"><input type="checkbox" id="tunnel-enabled-toggle"> Enabled</label>
    <label class="settings-field">Mode
      <select id="tunnel-mode"><option value="socks5">socks5</option></select>
    </label>
    <label class="settings-field">Host <input id="tunnel-host" type="text" class="settings-input mono"></label>
    <label class="settings-field">Port <input id="tunnel-port" type="number" class="settings-input mono"></label>
    <label class="settings-field">Username <input id="tunnel-username" type="text" class="settings-input"></label>
    <label class="settings-field">Password <input id="tunnel-password" type="password" class="settings-input" placeholder="unchanged"></label>

    <button id="settings-save-btn">Save</button>
    <div id="settings-save-msg" class="settings-save-msg"></div>

    <div class="panel-section-title">Extensions</div>
    <div id="extensions-list"></div>
    <button id="install-ublock-btn">Install uBlock Origin</button>
    <div id="extensions-msg" class="settings-save-msg"></div>
  </div>
  <div id="downloads-panel" class="panel panel-wide hidden">
    <div id="downloads-list"></div>
  </div>
  <div id="history-panel" class="panel panel-wide hidden">
    <div id="history-toolbar">
      <input id="history-search" type="text" placeholder="Search history" class="settings-input">
      <button id="history-clear-btn">Clear</button>
    </div>
    <div id="history-list"></div>
  </div>
  <div id="views">
    <div id="find-bar" class="find-bar hidden">
      <input id="find-input" type="text" placeholder="Find in page" autocomplete="off" aria-label="Find in page">
      <span id="find-count" class="find-count"></span>
      <button id="find-prev-btn" title="Previous match" aria-label="Previous match">&uarr;</button>
      <button id="find-next-btn" title="Next match" aria-label="Next match">&darr;</button>
      <button id="find-close-btn" title="Close" aria-label="Close">&times;</button>
    </div>
    <div id="zoom-indicator" class="zoom-indicator hidden"></div>
  </div>
  <script src="webview-tools.js"></script>
  <script src="renderer.js"></script>
  <script src="bookmarks-panel.js"></script>
  <script src="settings-panel.js"></script>
  <script src="downloads-panel.js"></script>
  <script src="history-panel.js"></script>
</body>
</html>
